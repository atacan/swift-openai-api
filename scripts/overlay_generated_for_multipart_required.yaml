overlay: 1.0.0
info:
  title: 'Fix OpenAPI spec - Add required: true to multipart/form-data request bodies'
  version: 1.0.0
actions:
  - target: $.paths./videos.post.requestBody
    update:
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/CreateVideoBody'
        application/json:
          schema:
            $ref: '#/components/schemas/CreateVideoBody'
      required: true
  - target: $.paths./videos/{video_id}/remix.post.requestBody
    update:
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/CreateVideoRemixBody'
        application/json:
          schema:
            $ref: '#/components/schemas/CreateVideoRemixBody'
      required: true
